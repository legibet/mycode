name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mycode-cli/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.12

      - name: Build
        run: uv build --no-sources

      - name: Verify wheel import
        run: uv run --isolated --no-project --with dist/*.whl -- python -c "import mycode"

      - name: Publish to PyPI
        run: uv publish
